version: "3.9"

services:

  medical-history-api:

    build: .

    container_name: medical-history-api

    ports:
      - "5002:5000"

    env_file:
      - .env

    environment:
      - MODELS_DIR=/app/models
      - MODEL_VERSION=v2
   
    restart: unless-stopped

    stop_grace_period: 30s

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/health"]

      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"

      options:
        max-size: "10m"
        max-file: "3"
